<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>音频播放器</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #f4f6f1;
      color: #202522;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid #b9c6ba;
      border-radius: 6px;
      background: #eef3ea;
      color: #202522;
      min-height: 40px;
      padding: 0 12px;
    }

    button:disabled {
      opacity: 0.42;
    }

    .page {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: none;
      background: #f4f6f1;
    }

    .page.active {
      display: block;
    }

    .start-page {
      padding: 28px 22px;
    }

    .start-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      min-height: 48px;
      border: 1px solid #9fb19f;
      border-radius: 6px;
      background: #e6eee2;
      color: #1f2a22;
      overflow: hidden;
    }

    .file-button input {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      opacity: 0;
    }

    .player-page {
      display: none;
      position: relative;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .player-page.active {
      display: flex;
    }

    .topbar {
      flex: 0 0 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 1px solid #273027;
      background: #f7f8f4;
      z-index: 2;
    }

    .topbar button {
      flex: 0 0 auto;
      width: 72px;
      padding: 0 6px;
    }

    .file-name-box {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      border: 1px solid #c6d0c3;
      border-radius: 6px;
      background: #ffffff;
      height: 38px;
      line-height: 36px;
      touch-action: none;
    }

    .file-progress {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 0;
      background: #d7e8d1;
      z-index: 0;
    }

    .file-name {
      position: relative;
      z-index: 1;
      display: inline-block;
      min-width: 100%;
      padding-left: 10px;
    }

    .progress-drag-panel {
      position: absolute;
      top: 58px;
      left: 12px;
      right: 12px;
      display: none;
      padding: 14px;
      border: 2px solid #202520;
      border-radius: 6px;
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(32, 37, 32, 0.2);
      z-index: 5;
      touch-action: none;
    }

    .progress-drag-panel.active {
      display: block;
    }

    .progress-drag-track {
      position: relative;
      height: 42px;
      overflow: hidden;
      border: 1px solid #9fb19f;
      border-radius: 6px;
      background: #eef3ea;
    }

    .progress-drag-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 0;
      background: #b9d7ad;
    }

    .progress-drag-handle {
      position: absolute;
      top: 4px;
      left: 0;
      width: 6px;
      height: 34px;
      border-radius: 4px;
      background: #202520;
      transform: translateX(-3px);
    }

    .progress-drag-time {
      position: relative;
      z-index: 1;
      height: 42px;
      line-height: 42px;
      text-align: center;
      color: #202522;
      font-size: 18px;
    }

    .file-name.scrolling {
      animation: marquee 11s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      35% { transform: translateX(0); }
      100% { transform: translateX(-60%); }
    }

    .mode-view {
      flex: 1 1 0;
      width: 100%;
      height: 0;
      min-height: 0;
      display: none;
      overflow: hidden;
    }

    .mode-view.active {
      display: flex;
    }

    .immersive-view {
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .touch-zone {
      display: flex;
      min-height: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #314038;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .touch-zone-top {
      order: 2;
      background: #e6efdf;
      border-top: 2px solid #202520;
    }

    .touch-zone-middle {
      order: 1;
      background: #f2f0e5;
    }

    .touch-zone-bottom {
      order: 3;
      background: #edf1e6;
      border-top: 2px solid #202520;
    }

    .zone-label {
      opacity: 0.72;
      font-size: 15px;
    }

    .reading-view {
      flex-direction: column;
      min-height: 0;
    }

    .line-area {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 22px 18px;
      background: #f6f7f0;
      touch-action: manipulation;
    }

    .line-card {
      min-height: 100%;
      display: block;
      padding-top: 18vh;
      text-align: left;
      line-height: 1.8;
      font-size: 22px;
      word-break: break-word;
      white-space: normal;
    }

    .empty-line {
      color: #7b837b;
      font-size: 16px;
      text-align: center;
    }

    .masked-word {
      display: inline-block;
      margin: 0 2px;
      filter: blur(7px);
      color: #202522;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .masked-word.revealed {
      filter: none;
      user-select: text;
      -webkit-user-select: text;
    }

    .controls {
      flex: 0 0 auto;
      padding: 10px;
      border-top: 1px solid #c3cabf;
      background: #eef2e9;
    }

    .control-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    .control-row button {
      flex: 1 1 0;
      min-width: 0;
      min-height: 52px;
      font-size: 18px;
    }

    .line-jump {
      margin-top: 10px;
    }

    .line-jump.hidden {
      display: none;
    }

    .line-jump-info {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      margin-bottom: 4px;
      color: #465048;
      font-size: 15px;
    }

    .line-jump input {
      width: 100%;
      height: 32px;
    }

    .config-page {
      z-index: 5;
      overflow: hidden;
    }

    .config-page.active {
      display: flex;
      flex-direction: column;
    }

    .config-header {
      flex: 0 0 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-bottom: 1px solid #c3cabf;
      background: #f7f8f4;
    }

    .config-header button {
      width: 72px;
      padding: 0 6px;
    }

    .config-title {
      font-size: 18px;
      font-weight: 600;
    }

    .config-body {
      flex: 1 1 auto;
      overflow: auto;
      padding: 12px;
    }

    .config-section {
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid #d2dacd;
      border-radius: 6px;
      background: #ffffff;
    }

    .config-section h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 600;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: #354239;
    }

    .field input[type="number"],
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid #bcc8bb;
      border-radius: 6px;
      background: #fbfcf8;
      color: #202522;
      padding: 9px;
    }

    .field input[type="range"] {
      width: 100%;
    }

    .field textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.5;
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
    }

    .inline-check input {
      width: 20px;
      height: 20px;
    }

    .range-value {
      float: right;
      color: #59645a;
      font-size: 14px;
    }

    .mark-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mark-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 6px 8px;
      border: 1px solid #d2dacd;
      border-radius: 6px;
      background: #f7f9f4;
    }

    .mark-time {
      flex: 1 1 auto;
      color: #202522;
    }

    .mark-delete {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 12px;
    }

    .mark-empty {
      color: #7b837b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="startPage" class="page start-page active">
    <div class="start-inner">
      <label class="file-button">
        <span>选择音频文件</span>
        <input id="startFileInput" type="file" accept="audio/*">
      </label>
    </div>
  </div>

  <div id="playerPage" class="page player-page">
    <div class="topbar">
      <button id="modeBtn" type="button">阅读</button>
      <div class="file-name-box">
        <div id="fileProgress" class="file-progress"></div>
        <span id="fileName" class="file-name">未选择音频</span>
      </div>
      <button id="configBtn" type="button">配置</button>
    </div>
    <div id="progressDragPanel" class="progress-drag-panel">
      <div id="progressDragTrack" class="progress-drag-track">
        <div id="progressDragFill" class="progress-drag-fill"></div>
        <div id="progressDragHandle" class="progress-drag-handle"></div>
        <div id="progressDragTime" class="progress-drag-time">0:00 / 0:00</div>
      </div>
    </div>

    <div id="immersiveView" class="mode-view immersive-view">
      <div id="topZone" class="touch-zone touch-zone-top">
        <div class="zone-label">点击播放/暂停，左右滑动调整进度</div>
      </div>
      <div id="middleZone" class="touch-zone touch-zone-middle">
        <div id="middleZoneLabel" class="zone-label">点击打点，左右滑动跳转点位</div>
      </div>
      <div id="bottomZone" class="touch-zone touch-zone-bottom">
        <div class="zone-label">左右滑动调整进度</div>
      </div>
    </div>

    <div id="readingView" class="mode-view reading-view">
      <div id="lineArea" class="line-area">
        <div id="lineCard" class="line-card"></div>
      </div>
      <div class="controls">
        <div class="control-row">
          <button id="backBtn" type="button">后退</button>
          <button id="playBtn" type="button">播放</button>
          <button id="forwardBtn" type="button">前进</button>
        </div>
        <div class="control-row">
          <button id="prevMarkBtn" type="button">上一点</button>
          <button id="markBtn" type="button">打点</button>
          <button id="nextMarkBtn" type="button">下一点</button>
        </div>
        <div id="lineJump" class="line-jump hidden">
          <div id="lineJumpText" class="line-jump-info">第 0 / 0 句</div>
          <input id="lineJumpInput" type="range" min="0" max="0" step="1" value="0" disabled>
        </div>
      </div>
    </div>
  </div>

  <div id="configPage" class="page config-page">
    <div class="config-header">
      <button id="backConfigBtn" type="button">返回</button>
      <div class="config-title">配置</div>
    </div>
    <div class="config-body">
      <div class="config-section">
        <h2>播放</h2>
        <div class="field">
          <label for="forwardStepInput">前进步长（秒）</label>
          <input id="forwardStepInput" type="number" min="1" max="300" step="1">
        </div>
        <div class="field">
          <label for="backStepInput">后退步长（秒）</label>
          <input id="backStepInput" type="number" min="1" max="300" step="1">
        </div>
        <div class="field">
          <label for="markJumpTimeoutInput">连续跳点超时（秒）</label>
          <input id="markJumpTimeoutInput" type="number" min="0.1" max="10" step="0.1">
        </div>
      </div>

      <div class="config-section">
        <h2>点位</h2>
        <div id="markList" class="mark-list"></div>
      </div>

      <div class="config-section">
        <h2>手势</h2>
        <div class="field">
          <label for="swipeThresholdInput">滑动触发阈值 <span id="swipeThresholdValue" class="range-value"></span></label>
          <input id="swipeThresholdInput" type="range" min="30" max="160" step="5">
        </div>
      </div>

      <div class="config-section">
        <h2>界面</h2>
        <div class="field">
          <label for="topRatioInput">沉浸式上区域占比 <span id="topRatioValue" class="range-value"></span></label>
          <input id="topRatioInput" type="range" min="15" max="60" step="1">
        </div>
        <div class="field">
          <label for="middleRatioInput">沉浸式中区域占比 <span id="middleRatioValue" class="range-value"></span></label>
          <input id="middleRatioInput" type="range" min="15" max="60" step="1">
        </div>
        <label class="inline-check">
          <input id="maskToggle" type="checkbox">
          <span>开启台词遮盖</span>
        </label>
      </div>

      <div class="config-section">
        <h2>台词</h2>
        <div class="field">
          <label for="lyricsInput">每一行作为一句</label>
          <textarea id="lyricsInput" placeholder="在这里输入台词，每行一句"></textarea>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    (function () {
      var storageKey = "phoneListenerSettings";
      var defaults = {
        mode: "immersive",
        forwardStep: 10,
        backStep: 5,
        markJumpTimeout: 1,
        maskText: false,
        swipeThreshold: 50,
        topRatio: 25,
        middleRatio: 25
      };
      var state = {
        page: "start",
        settings: loadSettings(),
        audioReady: false,
        fileUrl: "",
        fileName: "",
        lyrics: [],
        lineIndex: 0,
        marks: [],
        markJumpAnchor: null,
        markJumpAt: 0,
        markFeedbackTimer: null,
        progressDragging: false
      };
      var els = {};

      function $(id) {
        return document.getElementById(id);
      }

      function init() {
        cacheElements();
        bindEvents();
        applySettingsToControls();
        applyMode();
        renderLine();
        showPage("start");
      }

      function cacheElements() {
        els.startPage = $("startPage");
        els.playerPage = $("playerPage");
        els.configPage = $("configPage");
        els.startFileInput = $("startFileInput");
        els.modeBtn = $("modeBtn");
        els.configBtn = $("configBtn");
        els.fileProgress = $("fileProgress");
        els.fileName = $("fileName");
        els.fileNameBox = els.fileName ? els.fileName.parentNode : null;
        els.progressDragPanel = $("progressDragPanel");
        els.progressDragTrack = $("progressDragTrack");
        els.progressDragFill = $("progressDragFill");
        els.progressDragHandle = $("progressDragHandle");
        els.progressDragTime = $("progressDragTime");
        els.immersiveView = $("immersiveView");
        els.readingView = $("readingView");
        els.topZone = $("topZone");
        els.middleZone = $("middleZone");
        els.middleZoneLabel = $("middleZoneLabel");
        els.bottomZone = $("bottomZone");
        els.lineArea = $("lineArea");
        els.lineCard = $("lineCard");
        els.prevMarkBtn = $("prevMarkBtn");
        els.markBtn = $("markBtn");
        els.nextMarkBtn = $("nextMarkBtn");
        els.backBtn = $("backBtn");
        els.playBtn = $("playBtn");
        els.forwardBtn = $("forwardBtn");
        els.lineJump = $("lineJump");
        els.lineJumpText = $("lineJumpText");
        els.lineJumpInput = $("lineJumpInput");
        els.backConfigBtn = $("backConfigBtn");
        els.forwardStepInput = $("forwardStepInput");
        els.backStepInput = $("backStepInput");
        els.markJumpTimeoutInput = $("markJumpTimeoutInput");
        els.markList = $("markList");
        els.swipeThresholdInput = $("swipeThresholdInput");
        els.swipeThresholdValue = $("swipeThresholdValue");
        els.topRatioInput = $("topRatioInput");
        els.topRatioValue = $("topRatioValue");
        els.middleRatioInput = $("middleRatioInput");
        els.middleRatioValue = $("middleRatioValue");
        els.maskToggle = $("maskToggle");
        els.lyricsInput = $("lyricsInput");
        els.audio = $("audio");
      }

      function bindEvents() {
        els.startFileInput.onchange = onFileSelected;
        els.modeBtn.onclick = toggleMode;
        els.configBtn.onclick = function () { showPage("config"); };
        els.backConfigBtn.onclick = function () { showPage("player"); };
        els.playBtn.onclick = togglePlay;
        els.backBtn.onclick = function () { seekBy(-getNumber(state.settings.backStep, defaults.backStep)); };
        els.forwardBtn.onclick = function () { seekBy(getNumber(state.settings.forwardStep, defaults.forwardStep)); };
        els.markBtn.onclick = function () { addMark(false); };
        els.prevMarkBtn.onclick = jumpPrevMark;
        els.nextMarkBtn.onclick = jumpNextMark;
        els.lineJumpInput.oninput = onLineJumpInput;
        els.markList.onclick = onMarkListClick;
        bindProgressDrag();

        els.audio.onplay = updatePlayButton;
        els.audio.onpause = updatePlayButton;
        els.audio.ontimeupdate = function () {
          updateMarkButtons();
          updateFileProgress();
        };
        els.audio.onloadedmetadata = function () {
          updateMarkButtons();
          updateFileProgress();
        };

        bindSwipe(els.topZone, function (direction) {
          handleImmersiveSwipe(direction);
        }, function () {
          togglePlay();
        });
        bindSwipe(els.middleZone, function (direction) {
          handleMiddleSwipe(direction);
        }, function () {
          addMark(true);
        });
        bindSwipe(els.bottomZone, function (direction) {
          handleImmersiveSwipe(direction);
        }, null);
        bindSwipe(els.lineArea, function (direction) {
          handleReadingSwipe(direction);
        }, null);

        bindSettingInputs();
      }

      function bindSettingInputs() {
        els.forwardStepInput.oninput = function () {
          state.settings.forwardStep = normalizeNumber(this.value, 1, 300, defaults.forwardStep);
          saveSettings();
        };
        els.backStepInput.oninput = function () {
          state.settings.backStep = normalizeNumber(this.value, 1, 300, defaults.backStep);
          saveSettings();
        };
        els.markJumpTimeoutInput.oninput = function () {
          state.settings.markJumpTimeout = normalizeNumber(this.value, 0.1, 10, defaults.markJumpTimeout);
          saveSettings();
        };
        els.swipeThresholdInput.oninput = function () {
          state.settings.swipeThreshold = normalizeNumber(this.value, 30, 160, defaults.swipeThreshold);
          els.swipeThresholdValue.innerHTML = state.settings.swipeThreshold + "px";
          saveSettings();
        };
        els.topRatioInput.oninput = function () {
          state.settings.topRatio = normalizeNumber(this.value, 15, 60, defaults.topRatio);
          keepImmersiveRatiosValid("top");
          applyImmersiveRatio();
          saveSettings();
        };
        els.middleRatioInput.oninput = function () {
          state.settings.middleRatio = normalizeNumber(this.value, 15, 60, defaults.middleRatio);
          keepImmersiveRatiosValid("middle");
          applyImmersiveRatio();
          saveSettings();
        };
        els.maskToggle.onchange = function () {
          state.settings.maskText = !!this.checked;
          renderLine();
          saveSettings();
        };
        els.lyricsInput.oninput = function () {
          updateLyrics(this.value);
        };
      }

      function loadSettings() {
        var result = copyDefaults();
        var raw;
        var parsed;
        try {
          raw = window.localStorage.getItem(storageKey);
          if (raw) {
            parsed = JSON.parse(raw);
            mergeSettings(result, parsed);
          }
        } catch (e) {}
        return result;
      }

      function copyDefaults() {
        var copy = {};
        var key;
        for (key in defaults) {
          if (defaults.hasOwnProperty(key)) {
            copy[key] = defaults[key];
          }
        }
        return copy;
      }

      function mergeSettings(target, source) {
        if (!source) {
          return;
        }
        if (source.mode === "immersive" || source.mode === "reading") {
          target.mode = source.mode;
        }
        target.forwardStep = normalizeNumber(source.forwardStep, 1, 300, defaults.forwardStep);
        target.backStep = normalizeNumber(source.backStep, 1, 300, defaults.backStep);
        target.markJumpTimeout = normalizeNumber(source.markJumpTimeout, 0.1, 10, defaults.markJumpTimeout);
        target.maskText = !!source.maskText;
        target.swipeThreshold = normalizeNumber(source.swipeThreshold, 30, 160, defaults.swipeThreshold);
        target.topRatio = normalizeNumber(source.topRatio, 15, 60, defaults.topRatio);
        target.middleRatio = normalizeNumber(source.middleRatio, 15, 60, defaults.middleRatio);
        keepRatiosObjectValid(target, "middle");
      }

      function saveSettings() {
        try {
          window.localStorage.setItem(storageKey, JSON.stringify(state.settings));
        } catch (e) {}
      }

      function applySettingsToControls() {
        els.forwardStepInput.value = state.settings.forwardStep;
        els.backStepInput.value = state.settings.backStep;
        els.markJumpTimeoutInput.value = state.settings.markJumpTimeout;
        els.swipeThresholdInput.value = state.settings.swipeThreshold;
        els.swipeThresholdValue.innerHTML = state.settings.swipeThreshold + "px";
        els.topRatioInput.value = state.settings.topRatio;
        els.topRatioValue.innerHTML = state.settings.topRatio + "%";
        els.middleRatioInput.value = state.settings.middleRatio;
        els.middleRatioValue.innerHTML = state.settings.middleRatio + "%";
        els.maskToggle.checked = !!state.settings.maskText;
        applyImmersiveRatio();
      }

      function showPage(page) {
        state.page = page;
        removeClass(els.startPage, "active");
        removeClass(els.playerPage, "active");
        removeClass(els.configPage, "active");
        if (page === "start") {
          addClass(els.startPage, "active");
        } else if (page === "config") {
          addClass(els.configPage, "active");
          renderMarkList();
        } else {
          addClass(els.playerPage, "active");
        }
      }

      function onFileSelected() {
        var input = els.startFileInput;
        var file = input.files && input.files[0];
        if (!file) {
          return;
        }
        if (state.fileUrl) {
          getUrlApi().revokeObjectURL(state.fileUrl);
        }
        state.fileUrl = getUrlApi().createObjectURL(file);
        state.fileName = file.name || "已选择音频";
        state.audioReady = true;
        state.marks = [];
        renderMarkList();
        clearMarkJumpAnchor();
        els.audio.src = state.fileUrl;
        els.fileName.innerHTML = escapeHtml(state.fileName);
        updateFileNameScroll();
        els.audio.pause();
        applyMode();
        updatePlayButton();
        updateMarkButtons();
        updateFileProgress();
        showPage("player");
      }

      function toggleMode() {
        state.settings.mode = state.settings.mode === "immersive" ? "reading" : "immersive";
        saveSettings();
        applyMode();
      }

      function applyMode() {
        removeClass(els.immersiveView, "active");
        removeClass(els.readingView, "active");
        if (state.settings.mode === "immersive") {
          addClass(els.immersiveView, "active");
          els.modeBtn.innerHTML = "阅读";
        } else {
          addClass(els.readingView, "active");
          els.modeBtn.innerHTML = "沉浸";
        }
        applyImmersiveRatio();
        updateMarkButtons();
      }

      function applyImmersiveRatio() {
        var topRatio;
        var middleRatio;
        keepImmersiveRatiosValid("middle");
        topRatio = normalizeNumber(state.settings.topRatio, 15, 60, defaults.topRatio);
        middleRatio = normalizeNumber(state.settings.middleRatio, 15, 60, defaults.middleRatio);
        els.middleZone.style.flex = "0 0 " + topRatio + "%";
        els.topZone.style.flex = "0 0 " + middleRatio + "%";
        els.bottomZone.style.flex = "1 1 0";
        els.topRatioInput.value = topRatio;
        els.topRatioValue.innerHTML = topRatio + "%";
        els.middleRatioInput.value = middleRatio;
        els.middleRatioValue.innerHTML = middleRatio + "%";
      }

      function togglePlay() {
        if (!state.audioReady) {
          return;
        }
        if (els.audio.paused) {
          var promise = els.audio.play();
          if (promise && promise.catch) {
            promise.catch(function () {});
          }
        } else {
          els.audio.pause();
        }
        updatePlayButton();
      }

      function updatePlayButton() {
        els.playBtn.innerHTML = els.audio.paused ? "播放" : "暂停";
      }

      function seekBy(seconds) {
        if (!state.audioReady || isNaN(els.audio.duration)) {
          return;
        }
        var next = els.audio.currentTime + seconds;
        if (next < 0) {
          next = 0;
        }
        if (next > els.audio.duration) {
          next = els.audio.duration;
        }
        clearMarkJumpAnchor();
        els.audio.currentTime = next;
        updateMarkButtons();
        updateFileProgress();
      }

      function bindProgressDrag() {
        if (!els.fileNameBox) {
          return;
        }
        els.fileNameBox.ontouchstart = function (event) {
          beginProgressDrag(getEventClientX(event), event);
        };
        els.fileNameBox.onmousedown = function (event) {
          beginProgressDrag(getEventClientX(event), event);
        };
      }

      function beginProgressDrag(clientX, event) {
        if (!state.audioReady || !els.audio.duration || isNaN(els.audio.duration)) {
          return;
        }
        state.progressDragging = true;
        addClass(els.progressDragPanel, "active");
        updateProgressFromClientX(clientX);
        document.addEventListener("touchmove", onProgressDragMove, false);
        document.addEventListener("touchend", endProgressDrag, false);
        document.addEventListener("touchcancel", endProgressDrag, false);
        document.addEventListener("mousemove", onProgressDragMove, false);
        document.addEventListener("mouseup", endProgressDrag, false);
        preventEvent(event);
      }

      function onProgressDragMove(event) {
        if (!state.progressDragging) {
          return;
        }
        updateProgressFromClientX(getEventClientX(event));
        preventEvent(event);
      }

      function endProgressDrag(event) {
        if (!state.progressDragging) {
          return;
        }
        state.progressDragging = false;
        removeClass(els.progressDragPanel, "active");
        document.removeEventListener("touchmove", onProgressDragMove, false);
        document.removeEventListener("touchend", endProgressDrag, false);
        document.removeEventListener("touchcancel", endProgressDrag, false);
        document.removeEventListener("mousemove", onProgressDragMove, false);
        document.removeEventListener("mouseup", endProgressDrag, false);
        preventEvent(event);
      }

      function updateProgressFromClientX(clientX) {
        var rect = els.progressDragTrack.getBoundingClientRect();
        var ratio;
        if (!rect.width) {
          return;
        }
        ratio = (clientX - rect.left) / rect.width;
        if (ratio < 0) {
          ratio = 0;
        }
        if (ratio > 1) {
          ratio = 1;
        }
        clearMarkJumpAnchor();
        els.audio.currentTime = ratio * els.audio.duration;
        updateMarkButtons();
        updateFileProgress();
      }

      function addMark(showFeedback) {
        var mark;
        if (!state.audioReady) {
          return;
        }
        clearMarkJumpAnchor();
        mark = normalizeMarkTime(els.audio.currentTime);
        if (hasMark(mark)) {
          if (showFeedback) {
            showMiddleFeedback("点位已存在 " + formatTimeWithTenths(mark));
          }
          return;
        }
        state.marks.push(mark);
        state.marks.sort(function (a, b) { return a - b; });
        updateMarkButtons();
        renderMarkList();
        if (showFeedback) {
          showMiddleFeedback("已打点 " + formatTimeWithTenths(mark));
        }
      }

      function hasMark(mark) {
        var i;
        for (i = 0; i < state.marks.length; i += 1) {
          if (normalizeMarkTime(state.marks[i]) === mark) {
            return true;
          }
        }
        return false;
      }

      function onMarkListClick(event) {
        var target = event.target || event.srcElement;
        var index;
        if (!target || !hasClass(target, "mark-delete")) {
          return;
        }
        index = parseInt(target.getAttribute("data-mark-index"), 10);
        deleteMark(index);
      }

      function deleteMark(index) {
        if (isNaN(index) || index < 0 || index >= state.marks.length) {
          return;
        }
        state.marks.splice(index, 1);
        clearMarkJumpAnchor();
        updateMarkButtons();
        renderMarkList();
      }

      function renderMarkList() {
        var html = "";
        var i;
        if (!els.markList) {
          return;
        }
        if (!state.marks.length) {
          els.markList.innerHTML = '<div class="mark-empty">暂无点位</div>';
          return;
        }
        for (i = 0; i < state.marks.length; i += 1) {
          html += '<div class="mark-row">';
          html += '<div class="mark-time">' + (i + 1) + ". " + escapeHtml(formatTimeWithTenths(state.marks[i])) + '</div>';
          html += '<button class="mark-delete" type="button" data-mark-index="' + i + '">删除</button>';
          html += '</div>';
        }
        els.markList.innerHTML = html;
      }

      function getUniqueMarks() {
        var list = [];
        var i;
        var value;
        for (i = 0; i < state.marks.length; i += 1) {
          value = normalizeMarkTime(state.marks[i]);
          if (!list.length || Math.abs(list[list.length - 1] - value) > 0.1) {
            list.push(value);
          }
        }
        return list;
      }

      function getMarkSearchBase() {
        if (isMarkJumpAnchorActive()) {
          return state.markJumpAnchor;
        }
        return els.audio.currentTime;
      }

      function isMarkJumpAnchorActive() {
        var timeout = normalizeNumber(state.settings.markJumpTimeout, 0.1, 10, defaults.markJumpTimeout) * 1000;
        if (state.markJumpAnchor === null) {
          return false;
        }
        if (new Date().getTime() - state.markJumpAt <= timeout) {
          return true;
        }
        clearMarkJumpAnchor();
        return false;
      }

      function setMarkJumpAnchor(mark) {
        state.markJumpAnchor = mark;
        state.markJumpAt = new Date().getTime();
      }

      function clearMarkJumpAnchor() {
        state.markJumpAnchor = null;
        state.markJumpAt = 0;
      }

      function findPrevMark(baseTime) {
        var list = getUniqueMarks();
        var current = typeof baseTime === "number" ? baseTime : getMarkSearchBase();
        var i;
        for (i = list.length - 1; i >= 0; i -= 1) {
          if (list[i] < current - 0.15) {
            return list[i];
          }
        }
        return null;
      }

      function findNextMark(baseTime) {
        var list = getUniqueMarks();
        var current = typeof baseTime === "number" ? baseTime : getMarkSearchBase();
        var i;
        for (i = 0; i < list.length; i += 1) {
          if (list[i] > current + 0.15) {
            return list[i];
          }
        }
        return null;
      }

      function jumpPrevMark() {
        var mark = findPrevMark();
        if (mark !== null) {
          els.audio.currentTime = mark;
          setMarkJumpAnchor(mark);
          updateMarkButtons();
          updateFileProgress();
          showMiddleFeedback("上一点 " + formatTime(mark));
        }
      }

      function jumpNextMark() {
        var mark = findNextMark();
        if (mark !== null) {
          els.audio.currentTime = mark;
          setMarkJumpAnchor(mark);
          updateMarkButtons();
          updateFileProgress();
          showMiddleFeedback("下一点 " + formatTime(mark));
        }
      }

      function updateMarkButtons() {
        var ready = state.audioReady;
        var base = getMarkSearchBase();
        els.prevMarkBtn.disabled = !ready || findPrevMark(base) === null;
        els.nextMarkBtn.disabled = !ready || findNextMark(base) === null;
        els.markBtn.disabled = !ready;
        els.backBtn.disabled = !ready;
        els.forwardBtn.disabled = !ready;
        els.playBtn.disabled = !ready;
      }

      function updateFileProgress() {
        var percent = 0;
        if (state.audioReady && els.audio.duration && !isNaN(els.audio.duration)) {
          percent = (els.audio.currentTime / els.audio.duration) * 100;
        }
        if (percent < 0) {
          percent = 0;
        }
        if (percent > 100) {
          percent = 100;
        }
        els.fileProgress.style.width = percent + "%";
        if (state.progressDragging) {
          updateProgressDragPanel(percent);
        }
      }

      function updateProgressDragPanel(percent) {
        els.progressDragFill.style.width = percent + "%";
        els.progressDragHandle.style.left = percent + "%";
        els.progressDragTime.innerHTML = formatTime(els.audio.currentTime) + " / " + formatTime(els.audio.duration);
      }

      function updateFileNameScroll() {
        removeClass(els.fileName, "scrolling");
        window.setTimeout(function () {
          if (els.fileName.scrollWidth > els.fileName.parentNode.clientWidth + 2) {
            addClass(els.fileName, "scrolling");
          }
        }, 0);
      }

      function updateLyrics(text) {
        var raw = text.split(/\r?\n/);
        var lines = [];
        var i;
        for (i = 0; i < raw.length; i += 1) {
          if (trim(raw[i]) !== "") {
            lines.push(raw[i]);
          }
        }
        state.lyrics = lines;
        if (state.lineIndex >= state.lyrics.length) {
          state.lineIndex = Math.max(0, state.lyrics.length - 1);
        }
        renderLine();
      }

      function renderLine() {
        var line = state.lyrics[state.lineIndex];
        var i;
        var parts;
        var html = "";
        if (!line) {
          els.lineCard.innerHTML = '<div class="empty-line">暂无台词，请到配置页添加</div>';
          updateLineJump();
          return;
        }
        if (!state.settings.maskText) {
          els.lineCard.innerHTML = escapeHtml(line);
          updateLineJump();
          return;
        }
        parts = line.split(/(\s+)/);
        for (i = 0; i < parts.length; i += 1) {
          if (/^\s+$/.test(parts[i])) {
            html += escapeHtml(parts[i]);
          } else if (parts[i] !== "") {
            html += '<span class="masked-word">' + escapeHtml(parts[i]) + '</span>';
          }
        }
        els.lineCard.innerHTML = html;
        bindMaskedWords();
        updateLineJump();
      }

      function bindMaskedWords() {
        var words = els.lineCard.getElementsByTagName("span");
        var i;
        for (i = 0; i < words.length; i += 1) {
          if (hasClass(words[i], "masked-word")) {
            words[i].onclick = function (event) {
              addClass(this, "revealed");
              if (event && event.stopPropagation) {
                event.stopPropagation();
              }
            };
          }
        }
      }

      function changeLine(delta) {
        var next;
        if (!state.lyrics.length) {
          return;
        }
        next = state.lineIndex + delta;
        if (next < 0 || next >= state.lyrics.length) {
          return;
        }
        state.lineIndex = next;
        els.lineArea.scrollTop = 0;
        renderLine();
      }

      function onLineJumpInput() {
        var index = parseInt(els.lineJumpInput.value, 10) - 1;
        jumpToLine(index);
      }

      function jumpToLine(index) {
        if (!state.lyrics.length) {
          return;
        }
        if (isNaN(index)) {
          return;
        }
        if (index < 0) {
          index = 0;
        }
        if (index >= state.lyrics.length) {
          index = state.lyrics.length - 1;
        }
        state.lineIndex = index;
        els.lineArea.scrollTop = 0;
        renderLine();
      }

      function updateLineJump() {
        var total = state.lyrics.length;
        var current = total ? state.lineIndex + 1 : 0;
        if (!els.lineJumpText || !els.lineJumpInput) {
          return;
        }
        if (els.lineJump) {
          if (total) {
            removeClass(els.lineJump, "hidden");
          } else {
            addClass(els.lineJump, "hidden");
          }
        }
        els.lineJumpText.innerHTML = "第 " + current + " / " + total + " 句";
        els.lineJumpInput.min = total ? "1" : "0";
        els.lineJumpInput.max = total ? String(total) : "0";
        els.lineJumpInput.value = total ? String(current) : "0";
        els.lineJumpInput.disabled = total < 2;
      }

      function handleImmersiveSwipe(direction) {
        if (direction === "right") {
          seekBy(getNumber(state.settings.forwardStep, defaults.forwardStep));
        } else {
          seekBy(-getNumber(state.settings.backStep, defaults.backStep));
        }
      }

      function handleMiddleSwipe(direction) {
        if (direction === "right") {
          jumpNextMark();
        } else {
          jumpPrevMark();
        }
      }

      function handleReadingSwipe(direction) {
        if (direction === "left") {
          changeLine(1);
        } else {
          changeLine(-1);
        }
      }

      function showMiddleFeedback(text) {
        if (!els.middleZoneLabel) {
          return;
        }
        if (state.markFeedbackTimer) {
          window.clearTimeout(state.markFeedbackTimer);
        }
        els.middleZoneLabel.innerHTML = escapeHtml(text);
        state.markFeedbackTimer = window.setTimeout(function () {
          els.middleZoneLabel.innerHTML = "点击打点，左右滑动跳转点位";
          state.markFeedbackTimer = null;
        }, 1000);
      }

      function formatTime(seconds) {
        var total = Math.max(0, Math.floor(seconds));
        var minutes = Math.floor(total / 60);
        var rest = total % 60;
        return minutes + ":" + (rest < 10 ? "0" + rest : rest);
      }

      function formatTimeWithTenths(seconds) {
        var totalTenths = Math.round(normalizeMarkTime(seconds) * 10);
        var totalSeconds = Math.floor(totalTenths / 10);
        var minutes = Math.floor(totalSeconds / 60);
        var rest = totalSeconds % 60;
        var tenths = totalTenths % 10;
        return minutes + ":" + (rest < 10 ? "0" + rest : rest) + "." + tenths;
      }

      function normalizeMarkTime(seconds) {
        return Math.round(Math.max(0, seconds) * 10) / 10;
      }

      function keepImmersiveRatiosValid(changed) {
        keepRatiosObjectValid(state.settings, changed);
      }

      function keepRatiosObjectValid(settings, changed) {
        settings.topRatio = normalizeNumber(settings.topRatio, 15, 60, defaults.topRatio);
        settings.middleRatio = normalizeNumber(settings.middleRatio, 15, 60, defaults.middleRatio);
        if (settings.topRatio + settings.middleRatio > 80) {
          if (changed === "top") {
            settings.middleRatio = 80 - settings.topRatio;
          } else {
            settings.topRatio = 80 - settings.middleRatio;
          }
        }
        settings.topRatio = normalizeNumber(settings.topRatio, 15, 60, defaults.topRatio);
        settings.middleRatio = normalizeNumber(settings.middleRatio, 15, 60, defaults.middleRatio);
      }

      function bindSwipe(el, onSwipe, onTap) {
        var startX = 0;
        var startY = 0;
        var startTime = 0;
        el.ontouchstart = function (event) {
          var touch = event.changedTouches[0];
          startX = touch.clientX;
          startY = touch.clientY;
          startTime = new Date().getTime();
        };
        el.ontouchend = function (event) {
          var touch = event.changedTouches[0];
          var dx = touch.clientX - startX;
          var dy = touch.clientY - startY;
          var absX = Math.abs(dx);
          var absY = Math.abs(dy);
          var threshold = normalizeNumber(state.settings.swipeThreshold, 30, 160, defaults.swipeThreshold);
          var elapsed = new Date().getTime() - startTime;
          if (absX >= threshold && absX > absY * 1.25) {
            onSwipe(dx < 0 ? "left" : "right");
            if (event.preventDefault) {
              event.preventDefault();
            }
            return;
          }
          if (onTap && absX < 10 && absY < 10 && elapsed < 500) {
            onTap();
          }
        };
      }

      function normalizeNumber(value, min, max, fallback) {
        var num = parseFloat(value);
        if (isNaN(num)) {
          num = fallback;
        }
        if (num < min) {
          num = min;
        }
        if (num > max) {
          num = max;
        }
        return num;
      }

      function getNumber(value, fallback) {
        var num = parseFloat(value);
        return isNaN(num) ? fallback : num;
      }

      function getUrlApi() {
        return window.URL || window.webkitURL;
      }

      function getEventClientX(event) {
        if (event && event.touches && event.touches.length) {
          return event.touches[0].clientX;
        }
        if (event && event.changedTouches && event.changedTouches.length) {
          return event.changedTouches[0].clientX;
        }
        return event ? event.clientX : 0;
      }

      function preventEvent(event) {
        if (event && event.preventDefault) {
          event.preventDefault();
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function trim(text) {
        return String(text).replace(/^\s+|\s+$/g, "");
      }

      function addClass(el, name) {
        if (!hasClass(el, name)) {
          el.className = trim(el.className + " " + name);
        }
      }

      function removeClass(el, name) {
        var parts = el.className.split(/\s+/);
        var next = [];
        var i;
        for (i = 0; i < parts.length; i += 1) {
          if (parts[i] && parts[i] !== name) {
            next.push(parts[i]);
          }
        }
        el.className = next.join(" ");
      }

      function hasClass(el, name) {
        return (" " + el.className + " ").indexOf(" " + name + " ") > -1;
      }

      init();
    }());
  </script>
</body>
</html>
